<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTA Travel Expense</title>
    <!-- CSS 및 아이콘 라이브러리 (인터넷 연결 필요) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React 및 Babel (브라우저에서 React를 바로 실행하게 해줌) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; visibility: visible !important; }
            body { background: white !important; -webkit-print-color-adjust: exact; margin: 0; }
            @page { size: A4; margin: 15mm; }
        }
        .print-only { display: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        /* 입력창 포커스 스타일 */
        input:focus, select:focus { border-color: #cbd5e1 !important; outline: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // KOSTA 공식 로고 (A 부분 정밀 수정)
        const KostaLogo = ({ className = "h-10" }) => (
            <div className={`flex flex-col items-start ${className}`}>
                <svg viewBox="0 0 420 100" className="h-full w-auto" fill="none" xmlns="http://www.w3.org/2000/svg">
                    {/* KOST 텍스트 */}
                    <text x="0" y="75" style={{fontFamily: 'Arial Black, sans-serif', fontWeight: 900, fontSize: '88px'}} fill="black" letterSpacing="-6">KOST</text>
                    {/* A 로고 (왼쪽 검정, 오른쪽 빨강 삼각형 조합) */}
                    <g transform="translate(265, 5)">
                        {/* A의 왼쪽 몸체 (Black) */}
                        <path d="M0 75 L38 0 H48 L15 75 H0Z" fill="black" />
                        {/* A의 가로바 (Black) */}
                        <path d="M22 45 H55 V55 H22 V45Z" fill="black" />
                        {/* A의 오른쪽 다리 (Red) */}
                        <path d="M38 0 L76 75 H61 L26 0 H38Z" fill="#C11119" />
                    </g>
                </svg>
                <div className="text-[10px] font-bold tracking-[0.25em] text-black -mt-2 ml-1 uppercase">
                    Korea Ship Automation Service
                </div>
            </div>
        );

        const App = () => {
            const [expenses, setExpenses] = useState([]);
            const [showAddForm, setShowAddForm] = useState(false);
            const [showPreview, setShowPreview] = useState(false);
            const [tripInfo, setTripInfo] = useState({
                title: '', destination: 'China', detailedLocation: '',
                startDate: new Date().toISOString().split('T')[0],
                endDate: new Date().toISOString().split('T')[0]
            });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                category: 'Meals', amount: '', rate: '190', description: ''
            });

            // 아이콘 초기화
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [showPreview, showAddForm, expenses]);

            const totals = useMemo(() => expenses.reduce((acc, i) => {
                acc.krw += Math.round(Number(i.amount) * Number(i.rate));
                return acc;
            }, { krw: 0 }), [expenses]);

            const addExpense = (e) => {
                e.preventDefault();
                if (!formData.amount) return;
                const newExpense = { 
                    ...formData, 
                    id: Date.now(), 
                    krwAmount: Math.round(Number(formData.amount) * Number(formData.rate)) 
                };
                setExpenses([newExpense, ...expenses]);
                setFormData({ ...formData, amount: '', description: '' });
                setShowAddForm(false);
            };

            return (
                <div className="min-h-screen">
                    {/* 모바일 화면 (no-print) */}
                    <div className="no-print">
                        <header className="bg-white p-4 sticky top-0 z-40 shadow-sm flex justify-between items-center border-b border-slate-100">
                            <KostaLogo className="h-8" />
                            <div className="flex gap-2">
                                <button onClick={() => setShowPreview(true)} className="p-2 bg-slate-50 rounded-xl border border-slate-200">
                                    <i data-lucide="printer" className="w-5 h-5 text-slate-600"></i>
                                </button>
                            </div>
                        </header>

                        <main className="max-w-md mx-auto p-4 pb-32 space-y-6">
                            <div className="bg-slate-900 p-7 rounded-[2.5rem] text-white flex justify-between items-center shadow-xl">
                                <div>
                                    <p className="text-[10px] font-black text-white/40 uppercase mb-1 tracking-widest">Total Sum (KRW)</p>
                                    <p className="text-3xl font-black italic tracking-tighter">₩{totals.krw.toLocaleString()}</p>
                                </div>
                                <div className="text-red-600 font-black text-xl italic">KOSTA</div>
                            </div>

                            <section className="bg-white p-6 rounded-[2.5rem] border border-slate-200 space-y-4 shadow-sm text-left">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Vessel / Project</label>
                                <input type="text" className="w-full p-4 bg-slate-50 rounded-2xl text-sm font-bold border border-transparent" placeholder="Enter Vessel Name" value={tripInfo.title} onChange={e => setTripInfo({...tripInfo, title: e.target.value})} />
                                <div className="grid grid-cols-2 gap-3">
                                    <input type="text" className="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border border-transparent" placeholder="Location/Port" value={tripInfo.detailedLocation} onChange={e => setTripInfo({...tripInfo, detailedLocation: e.target.value})} />
                                    <select className="p-4 bg-slate-50 rounded-2xl text-xs font-black border border-transparent" value={tripInfo.destination} onChange={e => setTripInfo({...tripInfo, destination: e.target.value})}>
                                        <option value="China">China</option>
                                        <option value="USA">USA</option>
                                        <option value="Japan">Japan</option>
                                        <option value="Europe">Europe</option>
                                        <option value="Korea">Korea</option>
                                    </select>
                                </div>
                            </section>

                            <section className="space-y-3">
                                {expenses.map(item => (
                                    <div key={item.id} className="bg-white p-5 rounded-[2.5rem] border border-slate-100 flex justify-between items-center shadow-sm">
                                        <div className="text-left space-y-1">
                                            <div className="flex items-center gap-2">
                                                <span className="text-[10px] font-black text-red-600 bg-red-50 px-2 py-0.5 rounded-lg">{item.date}</span>
                                                <span className="text-[10px] font-bold text-slate-400 uppercase italic">{item.category}</span>
                                            </div>
                                            <p className="font-bold text-slate-800 text-sm">{item.description}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-black text-slate-900 text-lg italic font-sans">₩{item.krwAmount.toLocaleString()}</p>
                                            <button onClick={() => setExpenses(expenses.filter(e => e.id !== item.id))} className="text-[10px] font-black text-slate-300 uppercase hover:text-red-500">Delete</button>
                                        </div>
                                    </div>
                                ))}
                                {expenses.length === 0 && <p className="text-center py-10 text-slate-300 italic font-bold text-xs uppercase tracking-widest">No expenses added</p>}
                            </section>
                        </main>

                        <div className="fixed bottom-10 left-0 right-0 px-4 flex justify-center z-40">
                            <button onClick={() => setShowAddForm(true)} className="px-14 py-5 bg-slate-900 text-white rounded-[2.5rem] font-black shadow-2xl tracking-widest uppercase text-sm italic active:scale-95 transition-all">Add Expense</button>
                        </div>
                    </div>

                    {/* 공식 리포트 미리보기 (인쇄용) */}
                    {showPreview && (
                        <div className="fixed inset-0 z-[100] bg-slate-900 overflow-y-auto no-print flex flex-col items-center p-4 py-12 md:p-12">
                            <div className="bg-white w-full max-w-[210mm] p-[15mm] md:p-[20mm] shadow-2xl rounded-sm text-left">
                                <button onClick={() => setShowPreview(false)} className="mb-6 text-slate-400 font-bold uppercase text-xs tracking-widest">← Back to Edit</button>
                                
                                <div className="report-header border-b-4 border-slate-900 pb-4 mb-8 flex justify-between items-end">
                                    <KostaLogo className="h-12" />
                                    <div className="text-right">
                                        <h1 className="text-2xl font-black text-slate-900 uppercase italic">Travel Expense Report</h1>
                                        <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Official KOSTA Service Document</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-8 mb-8 text-[11px] font-bold">
                                    <p><span className="text-slate-400 mr-2 uppercase tracking-tighter font-black">Vessel:</span> {tripInfo.title || "TBA"}</p>
                                    <p className="text-right"><span className="text-slate-400 mr-2 uppercase tracking-tighter font-black">Port:</span> {tripInfo.destination} / {tripInfo.detailedLocation || "Yard"}</p>
                                </div>

                                <table className="w-full text-[10px] border-collapse mb-10">
                                    <thead>
                                        <tr className="bg-slate-50 border-y-2 border-slate-900">
                                            <th className="p-3">Date</th>
                                            <th className="p-3">Category</th>
                                            <th className="p-3 text-right">Sum (KRW)</th>
                                            <th className="p-3 text-left">Memo</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {expenses.map(item => (
                                            <tr key={item.id}>
                                                <td className="p-3 whitespace-nowrap">{item.date}</td>
                                                <td className="p-3 font-bold text-red-600 uppercase">{item.category}</td>
                                                <td className="p-3 text-right font-black">₩{item.krwAmount.toLocaleString()}</td>
                                                <td className="p-3 italic text-slate-500">{item.description}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                <div className="flex justify-end">
                                    <div className="bg-slate-900 text-white p-6 rounded-xl text-right min-w-[300px] shadow-lg">
                                        <p className="text-[10px] font-bold text-white/40 uppercase tracking-widest mb-1">Grand Total Sum</p>
                                        <p className="text-3xl font-black italic tracking-tighter font-sans">KRW {totals.krw.toLocaleString()}</p>
                                    </div>
                                </div>

                                <div className="mt-32 flex justify-between px-10 border-t border-slate-100 pt-10">
                                    <div className="text-center w-48 border-t border-slate-400 pt-2 font-bold text-[10px] text-slate-400 uppercase">Authorized Service Engineer</div>
                                    <div className="text-center w-48 border-t border-slate-400 pt-2 font-bold text-[10px] text-slate-400 uppercase">Master / Owner Representative</div>
                                </div>

                                <button onClick={() => window.print()} className="mt-20 w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase shadow-2xl no-print active:scale-95 transition-all italic tracking-widest">
                                    Confirm & Print Official Report
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 입력 폼 모달 */}
                    {showAddForm && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center p-4">
                            <div className="bg-white w-full max-w-sm mx-auto rounded-[3rem] p-8 shadow-2xl animate-in zoom-in-95 text-left">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black uppercase tracking-widest text-sm italic">Add New Entry</h3>
                                    <button onClick={() => setShowAddForm(false)} className="text-slate-300 hover:text-slate-500">
                                        <i data-lucide="x" className="w-5 h-5"></i>
                                    </button>
                                </div>
                                <form onSubmit={addExpense} className="space-y-4 font-sans">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-2 block">Date</label>
                                        <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-xs border border-transparent" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-red-600 uppercase ml-2 block">Rate (KRW)</label>
                                            <input type="number" className="w-full p-4 bg-red-50 text-red-700 rounded-2xl font-black text-sm text-center border border-transparent" placeholder="190" value={formData.rate} onChange={e => setFormData({...formData, rate: e.target.value})} />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-2 block">Amount</label>
                                            <input type="number" className="w-full p-4 bg-slate-50 rounded-2xl font-bold text-sm text-center border border-transparent" placeholder="0" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-2 block">Description</label>
                                        <input type="text" className="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border border-transparent" placeholder="e.g. Dinner" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} />
                                    </div>
                                    <button type="submit" className="w-full p-5 bg-slate-900 text-white rounded-[2rem] font-black uppercase active:scale-95 transition-all mt-4 italic tracking-widest">Add to Service List</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
